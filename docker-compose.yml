version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: stackforge_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: stackforge_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  mongodata:
